services:

  postgres:
    image: postgres:14.22-bookworm
    restart: always
    shm_size: 256mb
    environment:
      POSTGRES_PASSWORD: admin
      POSTGRES_USER: admin
      POSTGRES_DB: MuseoFranciscoVilla
    volumes:
      - postgresql_data:/var/lib/postgresql/data
      - ./Backend/database/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    networks:
      - museo-network

  backend:
    build: ./Backend
    restart: always
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://admin:admin@postgres:5432/MuseoFranciscoVilla
      JWT_SECRET: supersecretkeyforfranciscovilla12345
    depends_on:
      - postgres
    networks:
      - museo-network

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - museo-network

networks:
  museo-network:
    driver: bridge

volumes:
  postgresql_data: